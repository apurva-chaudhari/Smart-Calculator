<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="app-header">

        <h2>
            <i class="bi bi-calculator"></i>
            Smart Calculator
        </h2>

        <div>

            <button id="copyBtn" class="icon-btn" title="Copy Result">
                <i class="bi bi-copy"></i>
            </button>

            <button id="themeBtn" class="icon-btn" title="Dark Mode">
                <i class="bi bi-moon-fill"></i>
            </button>

        </div>

    </div>


    <!-- Calculator -->

    <div class="calculator">

        <!-- Display -->

        <input
            type="text"
            id="display"
            class="form-control"
            placeholder="0"
            readonly
        >


        <!-- Buttons -->

        <div class="buttons">

            <button class="btn special" onclick="clearDisplay()">
                AC
            </button>

            <button class="btn special" onclick="percentage()">
                %
            </button>

            <button class="btn special" onclick="backspace()">
                <i class="bi bi-backspace"></i>
            </button>

            <button class="btn operator" onclick="addValue('/')">
                ÷
            </button>



            <button class="btn number" onclick="addValue('7')">
                7
            </button>

            <button class="btn number" onclick="addValue('8')">
                8
            </button>

            <button class="btn number" onclick="addValue('9')">
                9
            </button>

            <button class="btn operator" onclick="addValue('*')">
                ×
            </button>



            <button class="btn number" onclick="addValue('4')">
                4
            </button>

            <button class="btn number" onclick="addValue('5')">
                5
            </button>

            <button class="btn number" onclick="addValue('6')">
                6
            </button>

            <button class="btn operator" onclick="addValue('-')">
                −
            </button>



            <button class="btn number" onclick="addValue('1')">
                1
            </button>

            <button class="btn number" onclick="addValue('2')">
                2
            </button>

            <button class="btn number" onclick="addValue('3')">
                3
            </button>

            <button class="btn operator" onclick="addValue('+')">
                +
            </button>



            <button class="btn number" onclick="addValue('00')">
                00
            </button>

            <button class="btn number" onclick="addValue('0')">
                0
            </button>

            <button class="btn number" onclick="addValue('.')">
                .
            </button>

            <button class="btn equal" onclick="calculateResult()">
                =
            </button>

        </div>

    </div>


    <!-- History -->

    <div class="history-box">

        <div class="history-header">

            <h4>
                <i class="bi bi-clock-history"></i>
                History
            </h4>

            <button id="clearHistoryBtn" class="clear-history">
                Clear
            </button>

        </div>

        <ul id="historyList"></ul>

    </div>

</div>


<!-- JavaScript -->

<script src="js/script.js"></script>

</body>

</html>
